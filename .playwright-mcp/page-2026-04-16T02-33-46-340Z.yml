              - code [ref=e227]:
                - generic [ref=e228]: "1"
                - text: /impeccable craft 文章详情页
                - generic [ref=e229]: "2"
                - text: /impeccable craft 用户登录表单
                - generic [ref=e230]: "3"
                - text: /impeccable craft 数据仪表盘卡片
            - paragraph [ref=e231]: Craft 模式会先进行设计规划（shaping），再加载相关参考文档，最后按照「结构 → 布局 → 排版色彩 → 交互状态 → 边缘状态 → 动效 → 响应式」的顺序完整构建，并在浏览器中进行可视化验证和迭代。
            - heading "3. Audit — 扫描设计反模式" [level=3] [ref=e232]
            - generic [ref=e234]:
