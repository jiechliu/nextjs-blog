            - heading "核心理念：teach → craft → audit" [level=2] [ref=e192]
            - paragraph [ref=e193]: Impeccable 的工作流围绕三个核心步骤展开：
            - heading "1. Teach — 建立项目设计上下文" [level=3] [ref=e194]
            - code [ref=e196]: /impeccable teach
            - paragraph [ref=e197]: 这是一次性的初始化步骤。运行后，AI 会通过一系列问题了解你的项目：
            - list [ref=e198]:
              - listitem [ref=e199]:
                - generic [ref=e201]: 目标用户是谁？使用场景是什么？
              - listitem [ref=e202]:
                - generic [ref=e204]: 品牌个性如何用 3 个词描述？
              - listitem [ref=e205]:
                - generic [ref=e207]: 参考网站是哪些？反面参考是什么？
              - listitem [ref=e208]:
                - generic [ref=e210]: 偏好深色还是浅色主题？
            - paragraph [ref=e211]:
              - text: 收集完毕后，上下文会保存到项目根目录的
              - code [ref=e212]: "`.impeccable.md`"
              - text: 文件中。之后每次调用设计相关指令，AI 都会自动读取这份上下文，确保风格一致。
            - heading "2. Craft — 构建功能界面" [level=3] [ref=e213]
            - code [ref=e215]: /impeccable craft [功能描述]
            - paragraph [ref=e216]: 例如：
            - generic [ref=e218]:
