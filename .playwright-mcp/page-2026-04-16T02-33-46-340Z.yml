            - heading "为什么 AI 生成的 UI 看起来都一样？" [level=2] [ref=e71]
            - paragraph [ref=e72]: 用过 Claude、Cursor 或任何 AI 工具写前端的人，大概都有过这种体验——你让它「做一个现代风格的卡片组件」，出来的东西是：
            - list [ref=e73]:
              - listitem [ref=e74]:
                - generic [ref=e76]: 字体：Inter（永远是 Inter）
              - listitem [ref=e77]:
                - generic [ref=e79]: 颜色：蓝紫渐变，背景带半透明模糊（glassmorphism）
              - listitem [ref=e80]:
                - generic [ref=e82]:
                  - text: 圆角：
                  - code [ref=e83]: "`rounded-xl`"
                  - text: 加一圈
                  - code [ref=e84]: "`drop-shadow`"
              - listitem [ref=e85]:
                - generic [ref=e87]:
                  - text: 强调文字：渐变文字（
                  - code [ref=e88]: "`background-clip: text`"
                  - text: ）
            - paragraph [ref=e89]: 一眼就能看出是 AI 生成的。
            - paragraph [ref=e90]:
              - strong [ref=e91]: 这不是 AI 不够聪明，而是训练数据的问题
              - text: 。所有大语言模型都从相同的通用模板学习，在没有额外指导的情况下，它们会回归到「最安全」的设计选择——也就是出现频率最高的那些。
            - paragraph [ref=e92]:
              - strong [ref=e93]:
                - link "Impeccable" [ref=e94] [cursor=pointer]:
                  - /url: https://github.com/pbakaus/impeccable
              - text: 就是为了解决这个问题而生的。
            - separator [ref=e95]
            - heading "Impeccable 是什么？" [level=2] [ref=e96]
            - paragraph [ref=e97]:
              - text: Impeccable 是一套专门针对 AI 辅助前端设计的「设计语言工具」，由
              - link "Paul Bakaus" [ref=e98] [cursor=pointer]:
                - /url: https://github.com/pbakaus
              - text: 创建，目前在 GitHub 上拥有超过
              - strong [ref=e99]: 19.6k Star
              - text: 。
            - paragraph [ref=e100]: 它的本质是一组结构化的 Skill 文件，安装到你的 AI 工具后，能显著提升 AI 生成 UI 的质量：
            - list [ref=e101]:
              - listitem [ref=e102]:
                - generic [ref=e104]:
                  - strong [ref=e105]: 7 个设计参考文档
                  - text: ：排版、色彩、空间设计、动效、交互、响应式、UX 文案
              - listitem [ref=e106]:
                - generic [ref=e108]:
                  - strong [ref=e109]: 18 个操作指令
                  - text: ：审计、评审、润色、提炼、动画等场景覆盖
              - listitem [ref=e110]:
                - generic [ref=e112]:
                  - strong [ref=e113]: 精选反模式清单
                  - text: ：明确告诉 AI 不该做什么（比如禁用渐变文字、禁用侧栏色条）
              - listitem [ref=e114]:
                - generic [ref=e116]:
                  - strong [ref=e117]: 独立 CLI 工具
                  - text: ：不依赖 AI 环境，直接扫描代码中的设计反模式
            - separator [ref=e118]
            - heading "安装" [level=2] [ref=e119]
