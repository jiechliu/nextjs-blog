            - heading "AI Agent 最大的浪费：重复犯同一个错" [level=2] [ref=e71]
            - paragraph [ref=e72]: 你有没有遇到过这种情况：同一个任务，上周让 Claude 做了一遍，今天重新开一个会话，它从头推理，走了一样的弯路，甚至犯了一样的错误。
            - paragraph [ref=e73]:
              - text: 这不是 AI 变笨了——而是它
              - strong [ref=e74]: 根本没有记忆
              - text: 。
            - paragraph [ref=e75]: 每次新会话，Agent 都从零开始。昨天花了 2000 个 Token 才摸索出的正确路径，今天继续花 2000 个 Token 重走一遍。团队里有多个 Agent 在同时工作？每个人各自重复摸索，互不共享。
            - paragraph [ref=e76]:
              - strong [ref=e77]:
                - link "OpenSpace" [ref=e78] [cursor=pointer]:
                  - /url: https://github.com/HKUDS/OpenSpace
              - text: 就是为了解决这个问题。
            - paragraph [ref=e79]:
              - text: 由香港大学数据智能实验室（HKUDS）开源，MIT 协议，2026 年 3 月发布。在 GDPVal 基准测试（44 种职业、220 个真实专业任务）中，实测
              - strong [ref=e80]: Token 消耗减少 46%
              - text: ，任务质量提升 30 个百分点。
            - separator [ref=e81]
