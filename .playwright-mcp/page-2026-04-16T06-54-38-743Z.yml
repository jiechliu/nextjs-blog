              - text: 是否都已复制到 skills 目录，缺少任何一个都会导致闭环失效。
            - paragraph [ref=e407]:
              - strong [ref=e408]: Q：任务执行到一半中断了？
            - paragraph [ref=e409]:
              - text: MCP 配置中的
              - code [ref=e410]: "`toolTimeout`"
              - text: 是否设置为 600？默认值通常太短，长任务会被超时截断。
            - paragraph [ref=e411]:
              - strong [ref=e412]:
                - text: Q：
                - code [ref=e413]: "`OPENSPACE_HOST_SKILL_DIRS`"
                - text: 配置后不生效？
            - paragraph [ref=e414]:
              - text: 必须使用绝对路径，不支持
              - code [ref=e415]: "`~`"
              - text: 或相对路径。
            - paragraph [ref=e416]:
              - strong [ref=e417]: Q：不想用云端功能，只用本地？
            - paragraph [ref=e418]:
              - text: 不配置
              - code [ref=e419]: "`OPENSPACE_API_KEY`"
              - text: 即可，所有进化的 Skill 仅存储在本地。
            - separator [ref=e420]
            - heading "总结" [level=2] [ref=e421]
            - paragraph [ref=e422]: OpenSpace 解决的是 AI Agent 的"健忘"问题。
            - paragraph [ref=e423]: 目前市面上大多数 Agent 工具专注于"这次任务做得更好"，而 OpenSpace 专注于"每次任务之后变得更好"。这个区别在长期、高频使用场景下会产生显著差异——越用越快，越用越省。
            - paragraph [ref=e424]: 对于每天都在用 Claude Code 跑大量任务的开发者，或者需要多个 Agent 协同工作的团队，这个工具值得认真试一下。
            - paragraph [ref=e425]:
              - text: 仓库地址：
              - link "https://github.com/HKUDS/OpenSpace" [ref=e426] [cursor=pointer]:
                - /url: https://github.com/HKUDS/OpenSpace
