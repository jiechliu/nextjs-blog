      - generic [ref=e67]:
        - article [ref=e68]:
          - generic [ref=e70]:
            - heading "问题：AI 写的代码为什么总要返工？" [level=2] [ref=e71]
            - paragraph [ref=e72]: 用 Claude Code 或类似 AI 工具写代码，很多人都遇过这个场景：需求描述完，AI 噼里啪啦写了一堆代码，跑起来却发现方向完全不对——边界条件没考虑、技术选型冒进、测试一个没有。
            - paragraph [ref=e73]: 回头重来，又是一轮。
            - paragraph [ref=e74]:
              - strong [ref=e75]: 这不是 AI 不够聪明，而是缺流程
              - text: 。专业开发团队之所以靠谱，不是因为每个人都比 AI 聪明，而是因为有规范：需求评审、技术方案、代码审查、TDD……这些护栏让工作变得可预测。
            - paragraph [ref=e76]:
              - strong [ref=e77]:
                - link "Superpowers" [ref=e78] [cursor=pointer]:
                  - /url: https://github.com/obra/superpowers
              - text: 就是给 AI 套上这套护栏的框架。
            - paragraph [ref=e79]:
              - text: 目前 GitHub 上
              - strong [ref=e80]: 155k Star
              - text: ，最新版本 v5.0.7（2026年3月发布）。
            - separator [ref=e81]
            - heading "Superpowers 是什么？" [level=2] [ref=e82]
            - paragraph [ref=e83]:
              - text: Superpowers 是一套基于 Agent Skills 的工作流框架，由
              - link "Jesse Vincent" [ref=e84] [cursor=pointer]:
                - /url: https://blog.fsck.com
              - text: 和
              - link "Prime Radiant" [ref=e85] [cursor=pointer]:
                - /url: https://primeradiant.com
              - text: 团队构建，MIT 协议开源。
            - paragraph [ref=e86]:
              - text: 核心理念只有一句话：
              - strong [ref=e87]: 流程大于提示词
              - text: 。
            - paragraph [ref=e88]: 它不会让 AI 更聪明，但会让 AI 更自律——通过在关键决策点自动触发结构化技能，强制执行经过验证的软件工程方法论：
            - list [ref=e89]:
              - listitem [ref=e90]:
                - generic [ref=e92]: 写代码前先搞清需求（Brainstorm）
              - listitem [ref=e93]:
                - generic [ref=e95]: 动手前先制定计划（Write Plan）
              - listitem [ref=e96]:
                - generic [ref=e98]: 任务分解，子代理并行（Subagent-Driven Development）
              - listitem [ref=e99]:
                - generic [ref=e101]: 先写测试，再写实现（TDD）
              - listitem [ref=e102]:
                - generic [ref=e104]: 完成后自动代码审查（Code Review）
            - separator [ref=e105]
            - heading "安装" [level=2] [ref=e106]
            - paragraph [ref=e107]: Superpowers 支持 Claude Code、Cursor、Codex、OpenCode、Gemini CLI 等主流 AI 工具。
            - heading "Claude Code（推荐）" [level=3] [ref=e108]
            - paragraph [ref=e109]:
