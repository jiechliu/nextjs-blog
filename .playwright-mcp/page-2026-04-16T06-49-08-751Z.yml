            - separator [ref=e395]
            - heading "常见误区" [level=2] [ref=e396]
            - paragraph [ref=e397]:
              - strong [ref=e398]: 误区：Superpowers 会消耗更多 Token
            - paragraph [ref=e399]: 事实：短期略有增加，但通过减少返工（方向错误重来一遍 = 消耗数倍 Token），总体消耗反而降低。
            - paragraph [ref=e400]:
              - strong [ref=e401]: 误区：TDD 太慢，影响效率
            - paragraph [ref=e402]: 事实：原型验证阶段可以跳过，但正式开发强烈建议开启——上线后发现的 Bug 修复成本远高于写测试的成本。
            - paragraph [ref=e403]:
              - strong [ref=e404]: 误区：需要记住所有命令
            - paragraph [ref=e405]: 事实：Superpowers 技能会自动触发，不需要手动调用。直接描述任务，框架会匹配合适的技能。只有想强制触发某个阶段时才需要手动输入命令。
            - separator [ref=e406]
            - heading "总结" [level=2] [ref=e407]
            - paragraph [ref=e408]: Superpowers 解决的不是 AI 能力问题，而是 AI 纪律问题。
            - paragraph [ref=e409]: 单靠提示词让 AI 遵循工程规范，稳定性很差——今天有效，明天不一定。Superpowers 把这些规范固化成自动触发的技能，让 AI 在每次关键决策点都能遵循一致的流程。
            - paragraph [ref=e410]: 如果你已经在用 Claude Code 做正式项目，这个框架值得花 5 分钟安装试试。差别会在第一次它主动停下来问你"这个功能的业务目标是什么"时就感受到。
