                - text: "Task 1: 创建 UserService 类 (预计 3 分钟)"
                - generic [ref=e306]: "2"
                - text: "- 文件: src/services/UserService.ts"
                - generic [ref=e307]: "3"
                - text: "- 依赖: src/types/User.ts"
                - generic [ref=e308]: "4"
                - text: "- 验证: UserService 单元测试通过"
                - generic [ref=e309]: "5"
                - generic [ref=e310]: "6"
                - text: "Task 2: 实现 getUserById 方法 (预计 2 分钟)"
                - generic [ref=e311]: "7"
                - text: "- 依赖: Task 1"
                - generic [ref=e312]: "8"
                - text: "- 验证: 返回正确的用户数据，处理 404 情况"
                - generic [ref=e313]: "9"
                - text: ...
            - paragraph [ref=e314]:
              - strong [ref=e315]: 计划需要你审阅确认
              - text: ，才能进入执行阶段。
            - heading "阶段三：Execute Plan — 子代理并行执行" [level=3] [ref=e316]
            - paragraph [ref=e317]:
              - text: 触发方式：
              - code [ref=e318]: "`/superpowers:execute-plan`"
            - paragraph [ref=e319]: 执行机制：
            - list [ref=e320]:
              - listitem [ref=e321]:
                - generic [ref=e323]:
                  - text: 互不依赖的任务交给
                  - strong [ref=e324]: 多个子代理并行处理
                  - text: ，显著提速
              - listitem [ref=e325]:
                - generic [ref=e327]:
                  - text: 每个子代理严格遵循
                  - strong [ref=e328]: TDD
                  - text: ：先写测试 → 看到红 → 写实现 → 看到绿 → 提交
              - listitem [ref=e329]:
