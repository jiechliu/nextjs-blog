            - heading "标准工作流：从需求到上线" [level=2] [ref=e269]
            - paragraph [ref=e270]: 适用于超过 50 行代码的功能开发，完整流程分为 4 个阶段：
            - heading "阶段一：Brainstorm — 先想清楚，再动手" [level=3] [ref=e271]
            - paragraph [ref=e272]:
              - text: 触发方式：描述需求，或直接输入
              - code [ref=e273]: "`/superpowers:brainstorm`"
              - text: 。
            - paragraph [ref=e274]:
              - text: AI 会
              - strong [ref=e275]: 主动停止编码冲动
              - text: ，转而通过苏格拉底式提问澄清：
            - list [ref=e276]:
              - listitem [ref=e277]:
                - generic [ref=e279]: 这个功能的业务目标是什么？
              - listitem [ref=e280]:
                - generic [ref=e282]: 有哪些技术约束？
              - listitem [ref=e283]:
                - generic [ref=e285]: 你偏好哪种实现方案？
              - listitem [ref=e286]:
                - generic [ref=e288]: 有哪些边界情况需要考虑？
            - paragraph [ref=e289]: 问题澄清完毕后，AI 会输出设计文档供你确认，再进入下一步。
            - heading "阶段二：Write Plan — 生成详细计划" [level=3] [ref=e290]
            - paragraph [ref=e291]:
              - text: 触发方式：
              - code [ref=e292]: "`/superpowers:write-plan`"
            - paragraph [ref=e293]: 输出一份精细到文件级别的实施计划：
            - generic [ref=e295]:
              - generic [ref=e296]:
                - generic [ref=e297]: text
                - button "复制" [ref=e298] [cursor=pointer]:
                  - img [ref=e299]
                  - generic [ref=e301]: 复制
              - code [ref=e304]:
