            - paragraph [ref=e123]:
              - strong [ref=e124]: 这不是 AI 不够聪明，而是训练数据的问题
              - text: 。所有大语言模型都从相同的通用模板学习，在没有额外指导的情况下，它们会回归到「最安全」的设计选择——也就是出现频率最高的那些。
            - paragraph [ref=e125]:
              - strong [ref=e126]:
                - link "Impeccable" [ref=e127] [cursor=pointer]:
                  - /url: https://github.com/pbakaus/impeccable
              - text: 就是为了解决这个问题而生的。
            - separator [ref=e128]
            - heading "Impeccable 是什么？" [level=2] [ref=e129]
            - paragraph [ref=e130]:
              - text: Impeccable 是一套专门针对 AI 辅助前端设计的「设计语言工具」，由
              - link "Paul Bakaus" [ref=e131] [cursor=pointer]:
                - /url: https://github.com/pbakaus
              - text: 创建，目前在 GitHub 上拥有超过
              - strong [ref=e132]: 19.6k Star
              - text: 。
            - paragraph [ref=e133]: 它的本质是一组结构化的 Skill 文件，安装到你的 AI 工具后，能显著提升 AI 生成 UI 的质量：
            - list [ref=e134]:
              - listitem [ref=e135]:
                - generic [ref=e137]:
                  - strong [ref=e138]: 7 个设计参考文档
                  - text: ：排版、色彩、空间设计、动效、交互、响应式、UX 文案
              - listitem [ref=e139]:
                - generic [ref=e141]:
                  - strong [ref=e142]: 18 个操作指令
                  - text: ：审计、评审、润色、提炼、动画等场景覆盖
              - listitem [ref=e143]:
                - generic [ref=e145]:
                  - strong [ref=e146]: 精选反模式清单
                  - text: ：明确告诉 AI 不该做什么（比如禁用渐变文字、禁用侧栏色条）
              - listitem [ref=e147]:
                - generic [ref=e149]:
                  - strong [ref=e150]: 独立 CLI 工具
                  - text: ：不依赖 AI 环境，直接扫描代码中的设计反模式
            - separator [ref=e151]
